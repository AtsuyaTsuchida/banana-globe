/* ================= SCENE ================= */
const R=1.0;

function toVec(lat,lon,r=R){
  const ph=(90-lat)*Math.PI/180, th=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph), r*Math.sin(ph)*Math.sin(th));
}

/* ---------- earth (night-lit, LEDIX dark) ---------- */
const uSunDir={value:toVec(15,95,1).normalize()}; // day over Asia — Americas/Atlantic stay night
const loader=new THREE.TextureLoader();
let loaded=0; const TOTAL=3;
function tex(url,srgb=true){return new Promise((res,rej)=>loader.load(url,t=>{
  if(srgb)t.colorSpace=THREE.SRGBColorSpace;
  t.anisotropy=renderer.capabilities.getMaxAnisotropy();
  loaded++; document.getElementById('lbar').style.width=(loaded/TOTAL*100)+'%'; res(t);
},undefined,rej));}

async function buildEarth(){
  const dayUrl=renderer.capabilities.maxTextureSize>=16384?'tex/color_16k.jpg':'tex/color_8k.jpg';
  const [tDay,tNight,tStars]=await Promise.all([
    tex(dayUrl), tex('tex/night_8k.jpg'), tex('tex/stars_8k.jpg'),

  const earth=new THREE.Mesh(
    new THREE.SphereGeometry(R,128,128),
    new THREE.ShaderMaterial({
      uniforms:{tDay:{value:tDay},tNight:{value:tNight},uSunDir},
      vertexShader:`
        varying vec2 vUv; varying vec3 vN;
        void main(){ vUv=uv; vN=normalize(mat3(modelMatrix)*normal);
          gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader:`
        uniform sampler2D tDay,tNight; uniform vec3 uSunDir;
        varying vec2 vUv; varying vec3 vN;
        void main(){
          float ndl=dot(normalize(vN),uSunDir);
          float dayF=smoothstep(-0.12,0.3,ndl);
          vec3 day=texture2D(tDay,vUv).rgb*(0.10+0.85*clamp(ndl,0.,1.));
          vec3 nt=texture2D(tNight,vUv).rgb;
          vec3 night=pow(nt,vec3(1.35))*vec3(1.0,0.74,0.42)*1.9 + vec3(.012,.016,.028);
          gl_FragColor=vec4(mix(night,day*0.55,dayF),1.0);
        }`
    }));

  const atmo=new THREE.Mesh(new THREE.SphereGeometry(R*1.13,96,64),
    new THREE.ShaderMaterial({transparent:true,blending:THREE.AdditiveBlending,side:THREE.BackSide,depthWrite:false,
      uniforms:{c:{value:new THREE.Color(0x2a4a8f)}},
      vertexShader:`varying vec3 vN; varying vec3 vP;
        void main(){ vN=normalize(normalMatrix*normal);
          vec4 mv=modelViewMatrix*vec4(position,1.0); vP=normalize(-mv.xyz);

      fragmentShader:`varying vec3 vN; varying vec3 vP; uniform vec3 c;

/* ---------- tangent-plane group at lat/lon ---------- */
function tangentGroup(lat,lon,lift=0.012){
  const n=toVec(lat,lon).normalize();
  const g=new THREE.Group();
  g.position.copy(n.clone().multiplyScalar(R+lift));
  g.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),n);
  scene.add(g); return g;
}
function circlePts(r,segs=96,frac=1,start=0){
  const p=[];
  for(let i=0;i<=segs*frac;i++){const a=start+i/segs*Math.PI*2;
    p.push(new THREE.Vector3(Math.cos(a)*r,Math.sin(a)*r,0));}
  return p;
}
function lineLoop(g,r,col,op,frac=1,start=0){
  const geo=new THREE.BufferGeometry().setFromPoints(circlePts(r,96,frac,start));
  const m=new THREE.Line(geo,new THREE.LineBasicMaterial({color:col,transparent:true,
    opacity:op,blending:THREE.AdditiveBlending,depthWrite:false}));
  g.add(m); return m;
}
function ringMesh(g,rIn,rOut,col,op){
  const m=new THREE.Mesh(new THREE.RingGeometry(rIn,rOut,128),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op,
      blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide}));
  g.add(m); return m;
}
/* LEDIX ring system on the sphere */
function ledixRing(g,Rr,colMain){
  for(let i=0;i<8;i++)lineLoop(g,Rr*(0.44+0.075*i),0xffffff,0.05+0.02*(i%3));
  ringMesh(g,Rr*.985,Rr*1.015,colMain,.9);
  ringMesh(g,Rr*.965,Rr*1.035,colMain,.28);
  const a1=ringMesh(g,Rr*1.045,Rr*1.055,0xffffff,.5); a1.geometry=new THREE.RingGeometry(Rr*1.045,Rr*1.055,64,1,0,1.1);
  const a2=ringMesh(g,Rr*1.075,Rr*1.082,0xffffff,.35); a2.geometry=new THREE.RingGeometry(Rr*1.075,Rr*1.082,64,1,2.5,1.9);
  return [a1,a2];
}
/* great-circle arc between two lat/lon */
function gcArc(a,b,bow=0.14,col=0x9aa4b2,op=.4){
  const v0=toVec(a.lat,a.lon),v1=toVec(b.lat,b.lon);
  const ang=v0.angleTo(v1), pts=[];
  if(ang<0.01){ // degenerate (same location, e.g. WALL ST → SPY): tiny lifted stub
    for(let i=0;i<=90;i++)pts.push(v0.clone().normalize().multiplyScalar(R*1.012));
    const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0,depthWrite:false}));
    scene.add(line); return {line,pts};
  }
  for(let i=0;i<=90;i++){const u=i/90;
    const p=v0.clone().multiplyScalar(Math.sin((1-u)*ang)/Math.sin(ang))
      .add(v1.clone().multiplyScalar(Math.sin(u*ang)/Math.sin(ang)));
    p.normalize().multiplyScalar(R*(1+0.012+Math.sin(Math.PI*u)*(bow*ang)));
    pts.push(p);}
  const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op,
      blending:THREE.AdditiveBlending,depthWrite:false}));
  scene.add(line); return {line,pts};
}
const flowTex=(()=>{const c=document.createElement('canvas');c.width=c.height=64;
  const g=c.getContext('2d'),rg=g.createRadialGradient(32,32,0,32,32,32);
  rg.addColorStop(0,'rgba(255,255,255,1)');rg.addColorStop(.4,'rgba(255,210,120,.7)');
  rg.addColorStop(1,'rgba(255,180,60,0)');g.fillStyle=rg;g.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);})();
function flowSprite(col,scale=.032){
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:flowTex,color:col,
    transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));

}

/* ================= loop ================= */
const clock=new THREE.Clock();
const ease=u=>u<.5?4*u*u*u:1-Math.pow(-2*u+2,3)/2;
let _ft=[],_deg=false,_prev=0;
function loop(now){
  requestAnimationFrame(loop);
  const t=clock.getElapsedTime();
  if(_prev&&!_deg){_ft.push(now-_prev);
    if(_ft.length>90){const avg=_ft.slice(-60).reduce((a,b)=>a+b,0)/60;
      if(avg>30){_deg=true;document.querySelectorAll('.dof').forEach(e=>e.remove());
        renderer.setPixelRatio(1);}}}
  _prev=now;
  if(flight){
    const u=Math.min(1,(now-flight.t0)/flight.dur);
    camera.position.lerpVectors(flight.from,flight.to,ease(u));
    if(u>=1)flight=null;
  }
  controls.update();
  anims[view].forEach(f=>f(t));
  composer.render();
  syncLabels();
}

setInterval(()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');
  document.getElementById('clk').textContent=
   `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())} JST`;},1000);

/* live data from the terminal export; embedded fallback on failure (e.g. file://) */
async function loadData(){
  try{
    const d=await(await fetch('data/nav.json')).json();
    if(!d||!d.months)return;
    MONTHS=d.months.map(x=>({m:x.m,ret:x.ret,nav:x.nav}));
    NAVX=d.nav; PNL=d.pnl;
    if(d.bananas){BAN.count=d.bananas.count;BAN.kg=d.bananas.kg;}
    else{BAN.count=Math.floor(Math.abs(PNL)/40);BAN.kg=Math.round(BAN.count*.15);}
    const jan=d.months.find(x=>x.m==='26-01');
    if(jan)BAN.prevJan=Math.floor(Math.abs((jan.nav-1)*(d.principal||100000))/40);
    const frac=[.5514,.2002,.1313,.087,.0301];   // value-chain split (推計)
    CHAIN.forEach((c,i)=>c.v=Math.round(frac[i]*Math.abs(PNL)));
    if(d.oracle&&d.oracle.months){
      ORC={nav:d.oracle.nav,pnl:d.oracle.pnl,
        months:d.oracle.months.map(x=>({m:x.m,pos:x.pos,pred:x.pred,ret:x.ret,nav:x.nav,live:!x.retro}))};
    }
  }catch(e){/* keep embedded fallback */}
}

Promise.all([buildEarth(),loadData()]).then(()=>{
  makeViews(); buildLens0(); buildLens1(); buildLens2(); buildLens3(); drawHist();
  document.getElementById('loading').remove();
  camera.position.copy(camPosFor(VIEWS[0]));
  setView(0); flight=null;
  requestAnimationFrame(loop);
}).catch(err=>{
  document.getElementById('loading').textContent='TEXTURE LOAD FAILED: '+err;
  console.error(err);
});
</script>
