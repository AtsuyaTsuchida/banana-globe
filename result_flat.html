<meta charset="utf-8" />
<title>TBOW — RESULT INDEX R-2026-07</title>
<style>
  :root{
    --amber:#FFB627; --amber2:#B07E1E; --bright:#FFD46A;
    --red:#FF5566; --cyan:#4FD8FF; --dim:#6a7186; --txt:#c8cdda;
    --sans:'Helvetica Neue','Hiragino Kaku Gothic ProN',Arial,sans-serif;
    --mono:'SF Mono','JetBrains Mono',Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden;font-family:var(--sans);color:var(--txt)}

  /* ---------- 3D stage ---------- */
  #stage{position:fixed;inset:0;perspective:1400px;perspective-origin:50% 38%;background:
    radial-gradient(120% 90% at 70% 10%, #0a0c12 0%, #05060a 55%, #000 100%)}
  #tilt{position:absolute;left:50%;top:56%;width:0;height:0;
    transform:rotateX(54deg) rotateZ(-12deg);transform-style:preserve-3d}
  #plane{position:absolute;left:0;top:0;width:2048px;height:1024px;transform-origin:0 0;
    transition:transform 1.9s cubic-bezier(.25,.8,.2,1)}
  #plane img.map{position:absolute;inset:0;width:100%;height:100%;
    filter:brightness(1.25) saturate(1.35) contrast(1.1);opacity:.94}
  #fx{position:absolute;inset:0;width:100%;height:100%}
  #plane{--s:2.35}
  .plbl{position:absolute;transform:translate(-50%,-50%) scale(calc(1/var(--s)));
    font-family:var(--mono);
    font-size:13px;letter-spacing:.14em;color:#fff;text-shadow:0 0 6px #000,0 0 3px #000;
    white-space:nowrap;opacity:.85}
  .plbl .d{display:inline-block;width:3px;height:3px;background:#fff;margin-right:5px;vertical-align:1px}
  .plbl.exp{color:var(--bright)} .plbl.imp{color:var(--cyan)} .plbl.evt{color:var(--red)}
  .plbl.focal{font-size:22px;letter-spacing:.22em;opacity:1;color:#fff;
    text-shadow:0 0 14px rgba(255,120,120,.8),0 0 4px #000}
  .plbl.focal .sub{display:block;font-size:12px;letter-spacing:.18em;color:var(--bright);margin-top:4px}

  /* depth of field + fog (screen space) */
  .dof{position:fixed;left:0;right:0;pointer-events:none;backdrop-filter:blur(3.5px);
    -webkit-mask-image:linear-gradient(#000,transparent);z-index:3}
  #dofT{top:0;height:20%;-webkit-mask-image:linear-gradient(#000 20%,transparent)}
  #dofB{bottom:0;height:26%;-webkit-mask-image:linear-gradient(transparent,#000 80%)}
  #fog{position:fixed;inset:0;pointer-events:none;z-index:2;background:
    radial-gradient(70% 55% at 8% 100%, rgba(235,238,245,.16), transparent 70%),
    radial-gradient(50% 40% at 100% 55%, rgba(120,140,180,.05), transparent 70%)}
  #vig{position:fixed;inset:0;pointer-events:none;z-index:4;background:
    linear-gradient(rgba(0,0,0,.55), transparent 14%, transparent 82%, rgba(0,0,0,.65)),
    radial-gradient(120% 100% at 50% 45%, transparent 60%, rgba(0,0,0,.5) 100%)}

  /* ---------- chrome ---------- */
  #brand{position:fixed;top:26px;left:30px;z-index:10}
  #brand .t{font-size:19px;letter-spacing:.34em;color:#fff;font-weight:300}
  #brand .s{font-size:8.5px;letter-spacing:.30em;color:var(--dim);margin-top:6px;line-height:1.8}
  #clockbox{position:fixed;top:30px;right:32px;z-index:10;text-align:right;
    font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--dim)}
  #clockbox b{color:var(--txt);font-weight:400}

  /* lens switcher */
  #lens{position:fixed;bottom:66px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;gap:4px}
  #lens button{background:transparent;border:1px solid #262b38;color:var(--dim);
    font-family:var(--sans);font-size:9.5px;letter-spacing:.24em;padding:8px 22px;cursor:pointer;
    transition:all .3s}
  #lens button:hover{color:var(--txt);border-color:#3a4256}
  #lens button.on{color:#fff;border-color:#8a93aa;background:rgba(255,255,255,.05)}
  #lens button i{font-style:normal;color:var(--amber2);margin-right:8px;font-family:var(--mono)}

  /* bottom-left lens block */
  #lensinfo{position:fixed;left:30px;bottom:58px;z-index:10;max-width:430px}
  #lensinfo .mark{width:34px;height:34px;border:1px solid #3a4256;border-radius:50%;
    display:flex;align-items:center;justify-content:center;margin-bottom:12px;position:relative}
  #lensinfo .mark::before{content:'';position:absolute;inset:5px;border:1px solid #262b38;border-radius:50%}
  #lensinfo .mark::after{content:'';width:6px;height:6px;background:var(--amber);border-radius:50%;
    box-shadow:0 0 8px var(--amber)}
  #lensinfo .nm{font-size:15px;letter-spacing:.16em;color:#fff;font-weight:300}
  #lensinfo .en{font-family:var(--mono);font-size:8.5px;letter-spacing:.3em;color:var(--amber2);margin:4px 0 8px}
  #lensinfo .ds{font-size:10.5px;line-height:1.9;color:#aab1c4;
    text-shadow:0 0 8px #000,0 1px 3px #000,0 0 14px #000}
  #lensinfo .nm{text-shadow:0 0 10px #000,0 1px 3px #000}

  /* bottom data strip */
  #strip{position:fixed;left:0;right:0;bottom:0;height:46px;z-index:9;
    background:linear-gradient(transparent, rgba(0,0,0,.75) 30%);
    display:flex;align-items:center;gap:26px;padding:6px 30px 4px 480px;
    font-family:var(--mono)}
  .fld{font-size:8.5px;letter-spacing:.12em;line-height:1.7;white-space:nowrap}
  .fld .k{color:var(--dim)} .fld .v{color:var(--txt)}
  .fld .v.a{color:var(--bright)} .fld .v.r{color:var(--red)} .fld .v.g{color:#3ddc84}
  #hist{width:230px;height:34px;flex:0 0 auto}

  /* right side panel (per lens) */
  #side{position:fixed;right:32px;top:110px;z-index:10;width:250px;font-family:var(--mono)}
  #side .row{display:flex;justify-content:space-between;align-items:baseline;
    padding:5px 0;border-bottom:1px solid #171b26;font-size:9.5px;letter-spacing:.08em}
  #side .row .k{color:var(--dim)} #side .row .v{color:var(--txt)}
  #side .row .v.a{color:var(--bright)} #side .row .v.r{color:var(--red)}
  #side .row .v.c{color:var(--cyan)} #side .row .v.g{color:#3ddc84}
  #side .hd{font-family:var(--sans);font-size:9px;letter-spacing:.3em;color:var(--dim);
    padding-bottom:8px}
  #side .bar{height:3px;background:#171b26;margin:3px 0 7px;position:relative}
  #side .bar i{position:absolute;left:0;top:0;bottom:0}
  @media(max-width:1100px){
    #lensinfo{bottom:150px;max-width:330px}
    #side{width:212px;top:150px;background:rgba(0,0,0,.35);padding:10px;backdrop-filter:blur(2px)}
    #brand .t{font-size:13px;letter-spacing:.24em}
    #brand .s{font-size:7.5px}
    #clockbox{top:10px;right:14px;font-size:7.5px}
  }
</style>

const W=2048,H=1024;
const P=(lat,lon)=>({x:(lon+180)/360*W, y:(90-lat)/180*H});
const plane=document.getElementById('plane');

 {f:P(BELT.lat+2,BELT.lon+6), s:2.15,
  nm:'バナナの視点', en:'LENS 02 — MATERIAL',
  ds:'+¥30,467はバナナ761本／約114kgに変換される。粒のひとつひとつが1本のバナナ。外側ほど古く、腐敗が進む。同心のバンドは代金の行方——大半は北に留まり、農園労働者に届くのは推計¥917。'},
 {f:P(26,-52), s:1.32,
  nm:'世界の視点', en:'LENS 03 — GEOPOLITICAL',
  ds:'利益の出所はバナナではなく世界だった。AIブームがXLKを、ヘッジ需要が金を押し上げ、3月の急落と4月の反発が通過した。琥珀のアークは南から北への果実、シアンは資本。バナナベルトは静かなまま。'},
];
let view=0, t0=performance.now();

function setView(v){
  view=v;
  const {f,s}=VIEWS[v];
  plane.style.setProperty('--s',s);
  plane.style.transform=`translate(${-f.x*s}px, ${-f.y*s}px) scale(${s})`;
  document.querySelectorAll('#lens button').forEach((b,i)=>b.classList.toggle('on',i===v));
  document.getElementById('liNm').textContent=VIEWS[v].nm;
  document.getElementById('liEn').textContent=VIEWS[v].en;
  document.getElementById('liDs').textContent=VIEWS[v].ds;
  buildLabels(v); buildSide(v); buildFields(v);
}
document.querySelectorAll('#lens button').forEach(b=>b.onclick=()=>setView(+b.dataset.v));
addEventListener('keydown',e=>{if(e.key>='1'&&e.key<='3')setView(+e.key-1)});

/* ================= labels ================= */
const plabels=document.getElementById('plabels');
function lbl(x,y,html,cls=''){const d=document.createElement('div');
  d.className='plbl '+cls; d.style.left=x+'px'; d.style.top=y+'px'; d.innerHTML=html;
  plabels.appendChild(d);}
function buildLabels(v){

  if(v===0){
    const c=VIEWS[0].f;
    lbl(c.x,c.y-8,'NAV 1.3047<span style="font-size:9px">x</span><span class="sub">+¥30,467 · p=0.227 · SIGNAL: NOISE</span>','focal');
    ETFS.forEach(e=>{const p=P(e.lat,e.lon);
      lbl(p.x,p.y-10,`<span class="d"></span>${e.tk} ${(e.pred>=0?'+':'')+(e.pred*100).toFixed(1)}%`,
        e.held?'exp':'');});
  }
  if(v===1){
    const c=VIEWS[1].f;
    lbl(c.x,c.y-6,'761 BANANAS<span class="sub">≈114 KG · +291 SINCE JAN · そして腐る</span>','focal');
    EXP.slice(0,5).forEach(e=>{const p=P(e.lat,e.lon);
      lbl(p.x,p.y-9,`<span class="d"></span>${e.n} ${(e.w*100|0)}%`,'exp');});
    const tj=P(TOKYO.lat,TOKYO.lon); lbl(tj.x,tj.y-9,'<span class="d"></span>TOKYO 小売 ¥40/本','imp');
  }
  if(v===2){
    const b=P(BELT.lat,BELT.lon);
    lbl(b.x,b.y+16,'BANANA BELT<span class="sub">$1.02 → $1.18 /KG · ほぼ沈黙</span>','focal');
    EVENTS.forEach(e=>{const p=P(e.lat,e.lon);
      lbl(p.x,p.y+(e.dy||-11),`<span class="d"></span>${e.n}`, e.c==='red'?'evt':(e.c==='cyan'?'imp':'exp'));});
    IMP.forEach(i=>{const p=P(i.lat,i.lon); lbl(p.x,p.y+10,i.n,'imp');});

}

/* ================= side panel / fields / hist ================= */
function buildSide(v){
  const s=document.getElementById('side'); let h='';
  if(v===0){
    h='<div class="hd">OBJECTIVE READOUT</div>';

      const col=e.c==='red'?'r':(e.c==='cyan'?'c':(e.c==='amber'?'a':'v'));

/* histogram (monthly returns, LEDIX-style) */
(function(){

/* ================= canvas: shared drawing helpers ================= */
function ring(cx,cy,R,t,base){ // LEDIX-style ring system
  ctx.save();
  for(let i=0;i<9;i++){
    const r=R*(0.42+0.072*i), a=0.05+0.05*Math.sin(t*0.9+i*1.7);
    ctx.beginPath(); ctx.arc(cx,cy,r,0,7);
    ctx.strokeStyle=`rgba(255,235,235,${Math.max(0,a)})`; ctx.lineWidth=.7; ctx.stroke();
  }
  ctx.shadowColor=base; ctx.shadowBlur=26;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,7);
  ctx.strokeStyle=base; ctx.lineWidth=3.2; ctx.globalAlpha=.85; ctx.stroke();
  ctx.shadowBlur=14; ctx.beginPath(); ctx.arc(cx,cy,R,0,7);
  ctx.strokeStyle='rgba(255,255,255,.95)'; ctx.lineWidth=1.1; ctx.stroke();
  ctx.globalAlpha=1;
  for(let k=0;k<2;k++){ // rotating arc segments
    const off=t*(.25+.13*k)*(k?-1:1), len=.5+.55*k;
    ctx.beginPath(); ctx.arc(cx,cy,R*(1.045+.03*k),off,off+len);
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=.9; ctx.shadowBlur=8; ctx.stroke();
  }
  ctx.restore();
}
function arc(a,b,bow,col,w,alpha){
  const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
  const dx=b.x-a.x, dy=b.y-a.y, L=Math.hypot(dx,dy);
  const cx=mx-dy/L*bow*L, cy=my+dx/L*bow*L;
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(cx,cy,b.x,b.y);
  ctx.strokeStyle=col; ctx.globalAlpha=alpha; ctx.lineWidth=w; ctx.stroke(); ctx.globalAlpha=1;
  return {cx,cy};
}
function qpt(a,c,b,u){const s=1-u;
  return {x:s*s*a.x+2*s*u*c.x+u*u*b.x, y:s*s*a.y+2*s*u*c.y+u*u*b.y};}
function spark(p,col,r=1.6){ // fast: flat core + soft halo, no shadowBlur
  ctx.fillStyle=col;
  ctx.fillRect(p.x-r/2,p.y-r/2,r,r);
  ctx.globalAlpha*= .28; ctx.fillRect(p.x-r*1.6,p.y-r*1.6,r*3.2,r*3.2);
  ctx.globalAlpha=1;
}
function glowSpark(p,col,r=1.6){ // expensive variant — few per frame only
  ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=8;
  ctx.fillStyle=col; ctx.fillRect(p.x-r/2,p.y-r/2,r,r); ctx.restore();
}

/* precomputed particles */
const DUST=Array.from({length:750},(_,i)=>{ // permutation null dust (view 0)
  const a=Math.random()*7, g=(Math.random()+Math.random()+Math.random()-1.5)*14;
  return {a, r:g, tw:Math.random()*7};});
const NANAS=Array.from({length:BAN.count},(_,i)=>{ // 761 bananas spiral (view 1)
  const k=i+1, r=3.1*Math.sqrt(k), a=k*2.39996;
  return {r,a,age:i/BAN.count,tw:Math.random()*7};});

/* ================= per-view frames ================= */
let _ft=[], _degraded=false;
function autoDegrade(ms){ // drop DoF blur (and thin the dust) on slow GPUs
  _ft.push(ms);
  if(_degraded||_ft.length<90)return;
  const avg=_ft.slice(-60).reduce((a,b)=>a+b,0)/60;
  if(avg>28){
    _degraded=true;
    document.querySelectorAll('.dof').forEach(e=>e.remove());
    DUST.length=Math.floor(DUST.length/2);
  }
}
let _prev=0;
function frame(now){
  if(_prev)autoDegrade(now-_prev); _prev=now;
  const t=(now-t0)/1000;
  ctx.clearRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';

  if(view===0){ /* -------- NUMBERS -------- */
    const c=VIEWS[0].f;
    // permutation null dust ring
    DUST.forEach(d=>{
      const R=118+d.r, a=.05+.05*Math.sin(t*1.4+d.tw);
      spark({x:c.x+Math.cos(d.a)*R, y:c.y+Math.sin(d.a)*R},`rgba(255,150,150,${a})`,1.1);
    });
    // monthly NAV arcs (growth rings)
    MONTHS.forEach((m,i)=>{
      const r=26+i*6.4, len=Math.min(2.9,Math.abs(m.ret)/13*3.1)+.12;
      const col=m.ret>=0?'rgba(255,210,130,':'rgba(255,90,100,';
      ctx.beginPath(); ctx.arc(c.x,c.y,r,-1.5708,-1.5708+len*(m.ret>=0?1:-1),m.ret<0);
      ctx.strokeStyle=col+(i===MONTHS.length-1?'.95)':'.55)');
      ctx.lineWidth=i===MONTHS.length-1?3:2; ctx.shadowColor=col+'1)';
      ctx.shadowBlur=i===MONTHS.length-1?14:5; ctx.stroke(); ctx.shadowBlur=0;
    });
    ring(c.x,c.y,118,t,'rgba(255,105,115,.9)');
    // ETF spokes from focal
    ETFS.forEach(e=>{
      const p=P(e.lat,e.lon);
      arc(c,p,.12,'rgba(160,175,200,.5)',.6,e.held?.6:.22);
      glowSpark(p, e.held?'rgba(255,214,106,.95)':'rgba(140,150,175,.5)', e.held?2.6:1.6);
    });
  }

  if(view===1){ /* -------- BANANA -------- */
    const c=VIEWS[1].f;
    // value-chain concentric bands (money that stays north = bright inner)
    let r=54;
    CHAIN.forEach((s,i)=>{
      if(s.k.startsWith('うち'))return;
      const wdt=Math.max(2, s.v/PNL*46);
      ctx.beginPath(); ctx.arc(c.x,c.y,r+wdt/2,0,7);
      ctx.strokeStyle=s.c; ctx.globalAlpha=.16+.05*Math.sin(t+i); ctx.lineWidth=wdt; ctx.stroke();
      ctx.globalAlpha=1; r+=wdt+4;
    });
    // the worker's ring — thin, faint, outermost
    ctx.beginPath(); ctx.arc(c.x,c.y,r+10,0,7);
    ctx.strokeStyle='rgba(255,182,39,.85)'; ctx.lineWidth=1; ctx.shadowColor='#FFB627';
    ctx.shadowBlur=10; ctx.stroke(); ctx.shadowBlur=0;
    // 761 bananas — spiral, rotting outward
    NANAS.forEach(n=>{
      const rot=n.age; // 0 fresh(center) → 1 old(edge)
      const cR=Math.round(255-rot*175), cG=Math.round(205-rot*160), cB=Math.round(80-rot*50);
      const a=.75-.35*rot+.15*Math.sin(t*2+n.tw);
      spark({x:c.x+Math.cos(n.a+t*.02)*n.r, y:c.y+Math.sin(n.a+t*.02)*n.r},
        `rgba(${cR},${cG},${cB},${Math.max(.08,a)})`,1.5);
    });
    ring(c.x,c.y,150,t,'rgba(255,182,39,.75)');
    // purchase flow: exporters → Tokyo (the return of profit as fruit)
    const tj=P(TOKYO.lat,TOKYO.lon);
    EXP.forEach((e,i)=>{
      const p=P(e.lat,e.lon), g=arc(p,tj,.16,'rgba(255,182,39,.4)',.7,.5);
      const u=(t*.06+i*.17)%1, q=qpt(p,{x:g.cx,y:g.cy},tj,u);
      glowSpark(q,'rgba(255,214,106,.9)',2);
    });
    // the thin money trickle back south (north → belt)
    const g2=arc(tj,c,-.13,'rgba(79,216,255,.5)',.5,.55);
    const u2=(t*.045)%1, q2=qpt(tj,{x:g2.cx,y:g2.cy},c,u2);
    glowSpark(q2,'rgba(79,216,255,.9)',1.7);
  }

  if(view===2){ /* -------- WORLD -------- */
    const b=P(BELT.lat,BELT.lon);
    // trade arcs south→north (amber, mass)
    EXP.forEach((e,i)=>{
      const p=P(e.lat,e.lon);
      IMP.forEach((im,j)=>{
        if((i+j)%2)return;
        const q=P(im.lat,im.lon), g=arc(p,q,.18,'rgba(255,182,39,.5)',.8+e.w*2,.4);
        const u=(t*.05+(i*.31+j*.5))%1, pt=qpt(p,{x:g.cx,y:g.cy},q,u);
        glowSpark(pt,'rgba(255,214,106,.95)',2.1);
      });
    });
    // capital arcs to NY (cyan)
    const ny=P(WALL.lat,WALL.lon);
    EXP.forEach((e,i)=>{
      const p=P(e.lat,e.lon), g=arc(p,ny,-.12,'rgba(79,216,255,.4)',.6,.35);
      const u=(t*.07+i*.2)%1, pt=qpt(p,{x:g.cx,y:g.cy},ny,u);
      glowSpark(pt,'rgba(79,216,255,.85)',1.6);
    });
    // event pulses
    EVENTS.forEach((e,i)=>{
      const p=P(e.lat,e.lon);
      const cyc=(t*.5+i*.7)%2.2, R=6+cyc*30, a=Math.max(0,.55-cyc*.3);
      const col=e.c==='red'?'255,85,102':(e.c==='cyan'?'79,216,255':
                e.c==='amber'?'255,182,39':'200,205,220');
      ctx.beginPath(); ctx.arc(p.x,p.y,R,0,7);
      ctx.strokeStyle=`rgba(${col},${a})`; ctx.lineWidth=1.1; ctx.stroke();
      glowSpark(p,`rgba(${col},.9)`,2);
    });
    ring(b.x,b.y,64,t,'rgba(255,182,39,.8)');
    ring(ny.x,ny.y,40,t*1.3,'rgba(255,105,115,.8)');
  }

  ctx.globalCompositeOperation='source-over';
  requestAnimationFrame(frame);
}

/* clock */
setInterval(()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');
  document.getElementById('clk').textContent=
   `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())} JST`;},1000);

setView(0);
requestAnimationFrame(frame);
</script>
